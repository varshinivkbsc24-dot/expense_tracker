<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Insights</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='insights-pretty.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="scene">
        <div class="container">
            <div class="hero">
                <h1>📊 Expense Insights</h1>
            </div>
            <div class="stats-grid">
                <div class="card">
                    <h2>Total Expenses</h2>
                    <p>₹{{ total }}</p>
                </div>
                <div class="card">
                    <h2>Number of Entries</h2>
                    <p>{{ count }}</p>
                </div>
                <div class="card">
                    <h2>Highest Category</h2>
                    <p>{{ highest }}</p>
                </div>
            </div>
            <div class="message">
                <p>{{ message }}</p>
            </div>
            <div class="chart-container">
                <canvas id="categoryChart"></canvas>
            </div>
            <div class="links">
                <a href="/" class="button secondary">🏠 Home</a>
                <a href="/add" class="button primary">➕ Add Expense</a>
            </div>
        </div>
    </div>
    <script>
        const ctx = document.getElementById('categoryChart').getContext('2d');
        const categories = {{ categories | tojson }};
        const amounts = {{ amounts | tojson }};
        const colors = [
            '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40'
        ];
        const chart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: categories,
                datasets: [{
                    data: amounts,
                    backgroundColor: colors.slice(0, categories.length),
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                    },
                    title: {
                        display: true,
                        text: 'Expenses by Category'
                    }
                }
            }
        });
    </script>
    <script src="{{ url_for('static', filename='insights.js') }}"></script>
</body>
</html>
