<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        form {
            margin: 20px;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: purple;
            color: white;
            border: none;
            cursor: pointer;
        }

        .expense {
            background: #1e293b;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;
        }

        a {
            color: red;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h1>💸 Expense Tracker</h1>

<form action="/add" method="POST">
    <input name="category" placeholder="Category" required>
    <input name="amount" placeholder="Amount" required>
    <input name="date" type="date" required>
    <input name="note" placeholder="Note">
    <br>
    <button type="submit">Add Expense</button>
</form>

<h2>Total: ₹{{ total }}</h2>

{% for exp in expenses %}
<div class="expense">
    <b>{{ exp.Category }}</b> - ₹{{ exp.Amount }} <br>
    {{ exp.Date }} <br>
    {{ exp.Note }}
    <br><br>
    <a href="/delete/{{ exp.ID }}">❌ Delete</a>
</div>
{% endfor %}

</body>
</html>
<canvas id="myChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let categories = {};
{% for exp in expenses %}
    categories["{{ exp.Category }}"] = 
    (categories["{{ exp.Category }}"] || 0) + {{ exp.Amount }};
{% endfor %}

let labels = Object.keys(categories);
let data = Object.values(categories);

new Chart(document.getElementById("myChart"), {
    type: 'pie',
    data: {
        labels: labels,
        datasets: [{
            data: data
        }]
    }
});
</script>
