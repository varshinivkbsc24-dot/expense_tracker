<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Expense</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f7ff; margin: 0; padding: 0; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .form-card { background:#fff; padding:24px; border-radius:18px; box-shadow:0 20px 40px rgba(0,0,0,0.1); width:min(420px,100%); }
        h1 { margin-top:0; color:#2f2d70; }
        label { display:block; margin:12px 0 6px; color:#555; }
        input, textarea, select { width:100%; padding:12px 14px; border-radius:12px; border:1px solid #d6d9ec; box-sizing:border-box; font-size:0.96rem; }
        button { margin-top:18px; width:100%; padding:12px; border:none; border-radius:12px; background:#645cff; color:#fff; font-size:1rem; cursor:pointer; }
        .back { display:inline-block; margin-top:14px; color:#645cff; text-decoration:none; }
    </style>
</head>
<body>
    <div class="form-card">
        <h1>Edit Expense</h1>
        <form action="/edit/{{ expense.id }}" method="POST">
            <label for="category">Category</label>
            <input id="category" name="category" value="{{ expense.category }}" required>
            <label for="amount">Amount</label>
            <input id="amount" name="amount" type="number" value="{{ expense.amount }}" required>
            <label for="date">Date</label>
            <input id="date" name="date" type="date" value="{{ expense.date }}" required>
            <label for="note">Note</label>
            <textarea id="note" name="note" rows="3">{{ expense.note }}</textarea>
            <button type="submit">Update Expense</button>
        </form>
        <a class="back" href="/">← Back to Home</a>
    </div>
</body>
</html>
